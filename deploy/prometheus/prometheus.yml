global:
  scrape_interval: 15s
  scrape_timeout: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "telemon-15s"
    metrics_path: /metrics
    scrape_interval: 15s
    http_sd_configs:
      - url: "http://hub:9186/prometheus/sd/15s"
        refresh_interval: 5s

  - job_name: "telemon-10s"
    metrics_path: /metrics
    scrape_interval: 10s
    http_sd_configs:
      - url: "http://hub:9186/prometheus/sd/10s"
        refresh_interval: 5s

  - job_name: "telemon-5s"
    metrics_path: /metrics
    scrape_interval: 5s
    http_sd_configs:
      - url: "http://hub:9186/prometheus/sd/5s"
        refresh_interval: 5s

  - job_name: "telemon-1s"
    metrics_path: /metrics
    scrape_interval: 1s
    scrape_timeout: 1s
    http_sd_configs:
      - url: "http://hub:9186/prometheus/sd/1s"
        refresh_interval: 5s

  - job_name: "telemon-static"
    metrics_path: /metrics/static
    scrape_interval: 300s
    http_sd_configs:
      - url: "http://hub:9186/prometheus/sd"
        refresh_interval: 30s
