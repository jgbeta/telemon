[package]
name = "telemon-macmon"
version = "0.6.1+telemon.1"
edition = "2021"
license = "MIT"
publish = false
description = "Minimal Telemon-vendored macmon library wrapper for Apple Silicon telemetry"

[lib]
name = "telemon_macmon"
path = "src/lib.rs"

[dependencies]
core-foundation = "0.10.1"
libc = "0.2.172"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
