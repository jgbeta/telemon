server:
  listen: "0.0.0.0:9185"
  metrics_path: "/metrics"
  static_metrics_path: "/metrics/static"

identity:
  user_name: ""
  device_name: ""
  machine_uuid: ""
  machine_uuid_file: ""

registration:
  enabled: false
  registry_addr: ""
  enrollment_token: ""
  device_id_file: ""
  heartbeat_interval_seconds: 30
  scrape_port: 9185
  advertised_addr: ""

collection:
  scrape_cache_stale_after_seconds: 60
  temperature_interval_seconds: 15
  sensor_rescan_interval_seconds: 300
  gpu_interval_seconds: 15
  windows_baseline_interval_seconds: 15
  windows_inventory_interval_seconds: 300
  static_info_interval_seconds: 300

adaptive_sampling:
  enabled: true
  levels:
    normal_seconds: 15
    warm_seconds: 10
    hot_seconds: 5
    critical_seconds: 1
  temperature:
    enabled: true
    warm_celsius: 60
    hot_celsius: 75
    critical_celsius: 85
  cooldown_seconds: 60

collectors:
  linux_hwmon:
    enabled: false
    root: "/sys/class/hwmon"
    include_unknown_sensors: false
    nvme_enrichment_enabled: true
    expose_storage_model: true
    sensor_allowlist: []
    sensor_denylist: []

  nvidia_nvml:
    enabled: true
    library_paths: []
    expose_gpu_name: true
    expose_gpu_uuid: false
    fan_speed_enabled: true

  windows_baseline:
    enabled: true
    include_removable_drives: false
    include_remote_drives: false
    network_interface_allowlist: []
    network_interface_denylist:
      - "loopback"
      - "isatap"
      - "teredo"

  windows_inventory:
    enabled: true

  windows_lhm_http:
    enabled: true
    url: "http://127.0.0.1:8085/data.json"
    timeout_ms: 1500
    include_unknown_sensors: false
    sensor_allowlist: []
    sensor_denylist: []
    require_provider: false

  windows_lhm_wmi:
    enabled: false
    namespace: "root\\LibreHardwareMonitor"
    include_unknown_sensors: false
    sensor_allowlist: []
    sensor_denylist: []
    require_provider: false

logging:
  level: "info"
