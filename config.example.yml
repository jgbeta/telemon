server:
  #listen: "127.0.0.1:9185"
  listen: "0.0.0.0:9185"
  metrics_path: "/metrics"
  static_metrics_path: "/metrics/static"

identity:
  user_name: ""
  device_name: ""
  machine_uuid: ""
  machine_uuid_file: ""

registration:
  enabled: false
  registry_addr: ""
  enrollment_token: ""
  device_id_file: ""
  heartbeat_interval_seconds: 30
  scrape_port: 9185
  advertised_addr: ""

collection:
  scrape_cache_stale_after_seconds: 60
  system_interval_seconds: 15
  macos_thermal_state_interval_seconds: 15
  temperature_interval_seconds: 15
  sensor_rescan_interval_seconds: 300
  gpu_interval_seconds: 15
  windows_baseline_interval_seconds: 15
  windows_inventory_interval_seconds: 300
  static_info_interval_seconds: 300

adaptive_sampling:
  # Device-level only: each /metrics scrape still includes all enabled dynamic sensors.
  # Prefer future downsampling/retention policy for long-term storage optimization.
  enabled: true
  levels:
    normal_seconds: 15
    warm_seconds: 10
    hot_seconds: 5
    critical_seconds: 1
  temperature:
    enabled: true
    warm_celsius: 60
    hot_celsius: 75
    critical_celsius: 85
  cooldown_seconds: 60

collectors:
  system:
    enabled: true
    cpu_enabled: true
    memory_enabled: true
    uptime_enabled: true

  macos_thermal_state:
    enabled: true

  macos_macmon:
    enabled: false
    sample_interval_seconds: 1
    sample_window_milliseconds: 1000
    stale_after_seconds: 5
    reinitialize_after_consecutive_errors: 5
    min_temperature_celsius: 1
    max_temperature_celsius: 130
    max_power_watts: 300

  macos_exact_temperature_experimental:
    enabled: false

  linux_hwmon:
    enabled: true
    root: "/sys/class/hwmon"
    include_unknown_sensors: false
    nvme_enrichment_enabled: true
    expose_storage_model: true
    sensor_allowlist: []
    sensor_denylist: []

  linux_power_supply:
    enabled: false
    root: "/sys/class/power_supply"
    derive_power_when_missing: true

  linux_amdgpu:
    enabled: false
    root: "/sys/class/drm"
    include_diagnostic_only_gpu_metrics: true

  linux_drm:
    enabled: false
    drm_root: "/sys/class/drm"
    proc_root: "/proc"
    target_pid:
    include_hwmon: true
    include_fdinfo: false

  steam_deck_game_state:
    enabled: false
    poll_interval_seconds: 1
    stop_debounce_seconds: 5
    xprop_path: "xprop"
    display: ":0"
    auto_discover_steam_display: true
    desktop_fallback_enabled: true
    process_fallback_enabled: true

  nvidia_nvml:
    enabled: true
    library_paths: []
    expose_gpu_name: true
    expose_gpu_uuid: false
    fan_speed_enabled: true

  windows_baseline:
    enabled: false
    include_removable_drives: false
    include_remote_drives: false
    network_interface_allowlist: []
    network_interface_denylist:
      - "loopback"
      - "isatap"
      - "teredo"

  windows_inventory:
    enabled: false

  windows_lhm_http:
    enabled: false
    url: "http://127.0.0.1:8085/data.json"
    timeout_ms: 1500
    include_unknown_sensors: false
    sensor_allowlist: []
    sensor_denylist: []
    require_provider: false

  windows_lhm_wmi:
    enabled: false
    namespace: "root\\LibreHardwareMonitor"
    include_unknown_sensors: false
    sensor_allowlist: []
    sensor_denylist: []
    require_provider: false

diagnostics:
  enabled: true
  scrape_gap_threshold_seconds: 30
  scheduler_lag_threshold_seconds: 5
  log_scrape_gaps: true
  log_scheduler_lag: true
  log_scrape_interval_changes: true

logging:
  level: "info"
